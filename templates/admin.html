<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina chat admin </title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style/header.css')}}" />
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style/suport_chat_live.css')}}" />

</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark dashboard-header">
        <a class="navbar-brand" href="#">
            <img src="https://www.ub.ro/frontend/assets/identity/logo.svg" alt="Admin Logo">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="/dashboard"><i class="fas fa-home"></i></a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button"
                        data-bs-toggle="dropdown" aria-expanded="false">
                        Gestionare Date
                    </a>
                    <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                        <li><a class="dropdown-item" href="/administrare_date">Adauga date</a></li>
                        <li><a class="dropdown-item" href="/intrebari_fara_raspuns">Intrebari fara Raspuns</a></li>
                    </ul>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/administrare_utilizatori">Administrare utilizatori</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/panou_control">Setări chatbot</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/admin_chat">Suport live</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle logout-btn" href="#" id="navbarDropdown" role="button"
                        data-bs-toggle="dropdown" aria-expanded="false">
                        Administrator
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                        <li><a class="dropdown-item" href="/delogare">Delogare</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </nav>
    <h2 style="padding-top: 20px;">Pagina chat admin</h2>
    <div id="container">
        <div id="sessions-container">
            <div id="sessions-title-bar">
                <h5>Sesiuni active</h5>
            </div>
            <div id="sessions">

            </div>
        </div>
        <div id="messages-container">
            <div id="title-bar">
                <span id="session-title"></span>
                <div>
                    <button class="btn btn-success" onclick="preluare_sesiune()">Preluare</button>
                    <button class="btn btn-danger" onclick="inchidere_sesiune()">Inchidere</button>
                </div>
            </div>
            <div id="messages"></div>
            <div class="input-group">
                <input type="text" id="message" class="form-control" placeholder="Scrie un mesaj..." disabled>
                <div class="input-group-append">
                    <button class="btn btn-primary" onclick="trimite_mesaj_la_user()" disabled>Trimite</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script type="text/javascript" src="{{ url_for('static', filename='javascript/script_suport_chat_live.js') }}"></script>

</body>

</html>
