<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style/login_portal_admin.css')}}" />

</head>
<body>
    <div class="login-container">
        <form class="login-form text-center" action="{{ url_for('autentificare_admin') }}" method="post">
            <div class="login-brand">
                <img src="/static/uploads/logo_universitate_bacau.png" alt="logo">
                <span class="login-title"> Logare Portal Admin </span>
            </div>

            {% if error %}
                <p class="error">{{ error }}</p>
            {% endif %}

            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="floatingInput" name="adresa_email" placeholder="nume_exemplu.com" required>
                <label for="floatingInput">Adresă Email</label>
            </div>
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="floatingPassword" name="parola" placeholder="Parola" required>
                <label for="floatingPassword">Parolă</label>
            </div>

            <div class="checkbox mb-3">
                <label>
                    <input type="checkbox" name="retine_parola" value="retine_parola"> Reține parola
                </label>
            </div>
            <button class="w-100 btn btn-lg btn-login" type="submit">Logare</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
