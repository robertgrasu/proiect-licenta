    <div class="container" style="margin-top: 50px;">
        <h2 style="text-align: center;">Întrebări fără răspuns</h2>
        <div class="d-flex justify-content-end mb-2">
            <button id="delete-selected" class="btn btn-danger" style="display: none;">Șterge selectate</button>
        </div>
        <div class="table-responsive mt-4">
            <table id="intrebari-fara-raspuns-table" class="table table-striped table-fixed">
                <thead>
                    <tr>
                        <th class="col-fixed-id"><input type="checkbox" id="select-all"></th>
                        <th class="col-fixed-nr">Nr</th>
                        <th>Întrebare</th>
                        <th>Timp</th>
                        <th class="col-fixed-actions">Acțiuni</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Întrebarile sunt fi încărcate aici prin AJAX -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.10.24/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.10.24/js/dataTables.bootstrap5.min.js"></script>
    <script>
        $(document).ready(function () {
            var table = $('#intrebari-fara-raspuns-table').DataTable({

                ajax: {
                    url: '/get_intrebari_fara_raspuns',
                    dataSrc: ''
                },
                language: {
                    search: "Căutare:",
                    searchPlaceholder: "Căutare...",
                    lengthMenu: "Afișează _MENU_ înregistrări pe pagină",
                    info: "Afișate _START_ până la _END_ din _TOTAL_ înregistrări",
                    // paginate: {
                    //     first: "Prima",
                    //     last: "Ultima",
                    //     next: "Următoarea",
                    //     previous: "Precedenta"
                    // },
                    infoFiltered: "(filtrate din _MAX_ înregistrări totale)",
                    infoEmpty: "Afișare 0 până la 0 din 0 înregistrări",
                    emptyTable: "Nu există date disponibile în tabel",
                    zeroRecords: "Nu au fost găsite înregistrări care să se potrivească",
                },
                info: false,
                dom: 'tip',

                columns: [
                    {
                        data: 'id', render: function (data) {
                            return `<input type="checkbox" class="select-row" value="${data}">`;
                        }
                    },
                    { data: null },
                    { data: 'question' },
                    {
                        data: 'timestamp',
                        render: function (data) {
                            var date = new Date(data);
                            return date.toLocaleString('ro-RO', {
                                year: 'numeric',
                                month: '2-digit',
                                day: '2-digit',
                                hour: '2-digit',
                                minute: '2-digit',
                                second: '2-digit'
                            });
                        }
                    },
                    {
                        data: 'id',
                        render: function (data) {
                            return `<button class="btn btn-danger btn-sm" onclick="stergere_intrebare(${data})"><i class="fas fa-trash-alt"></i></button>`;
                        }
                    }
                ],
                columnDefs: [
                    {
                        searchable: false,
                        orderable: false,
                        targets: [0, 1, 4]
                    },
                    {
                        orderable: false,
                        targets: 0
                    }
                ],
                order: [[2, 'asc']]
            });

            table.on('order.dt search.dt', function () {
                table.column(1, { search: 'applied', order: 'applied' }).nodes().each(function (cell, i) {
                    cell.innerHTML = i + 1;
                });
            }).draw();

            $('#select-all').on('click', function () {
                var rows = table.rows({ 'search': 'applied' }).nodes();
                $('input[type="checkbox"]', rows).prop('checked', this.checked);
                toggle_select_stergere_btn();
            });

            $('#intrebari-fara-raspuns-table tbody').on('change', 'input[type="checkbox"]', function () {
                if (!this.checked) {
                    var el = $('#select-all').get(0);
                    if (el && el.checked && ('indeterminate' in el)) {
                        el.indeterminate = true;
                    }
                }
                toggle_select_stergere_btn();
            });

            function toggle_select_stergere_btn() {
                var selected = $('input.select-row:checked').length > 0;
                $('#delete-selected').toggle(selected);
            }

            $('#delete-selected').on('click', function () {
                var ids = [];
                table.$('input[type="checkbox"]').each(function () {
                    if (this.checked) {
                        ids.push(this.value);
                    }
                });

                if (ids.length > 0 && confirm('Ești sigur că vrei să ștergi întrebările selectate?')) {
                    $.ajax({
                        url: '/stergere_intrebari_fara_raspuns',
                        type: 'POST',
                        data: { ids: ids },
                        success: function (response) {
                            alert('Întrebările selectate au fost șterse cu succes!');
                            table.ajax.reload();
                            $('#delete-selected').hide();
                        },
                        error: function () {
                            alert('Eroare la ștergerea întrebărilor.');
                        }
                    });
                }
            });
        });

        function stergere_intrebare(questionId) {
            if (confirm('Ești sigur că vrei să ștergi această întrebare?')) {
                $.ajax({
                    url: '/stergere_intrebari_fara_raspuns',
                    type: 'POST',
                    data: { ids: [questionId] },
                    success: function (response) {
                        alert('Întrebare ștearsă cu succes!');
                        $('#intrebari-fara-raspuns-table').DataTable().ajax.reload();
                    },
                    error: function () {
                        alert('Eroare la ștergerea întrebării.');
                    }
                });
            }
        }
    </script>
</body>
